name: Deno

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  zizmor:
    name: Run zizmor
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required for upload-sarif (used by zizmor-action) to upload SARIF files.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2

  test:
    runs-on: ubuntu-latest
    name: Test
    permissions: {}

    steps:
      - name: Setup repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # 2.0.4
        with:
          deno-version: "^2"

      - name: Run checks
        run: deno task ci

  publish:
    if: github.repository == 'AnInternetTroll/speedrunbot-slash-deno-deploy-2' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [test]
    environment: production
    name: Deploy
    permissions: {}

    env:
      TOKEN: ${{ secrets.TOKEN }}
      PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
      CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
      DENO_DEPLOY_TOKEN: ${{ secrets.DENO_DEPLOY_TOKEN }}
      PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
      DENO_DEPLOY_ORGANISATION_NAME: ${{ secrets.DENO_DEPLOY_ORGANISATION_NAME }}

    steps:
      - name: Setup repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # 2.0.4
        with:
          deno-version: "^2"

      - name: Create
        run: |
          deno deploy create \
                --org "${DENO_DEPLOY_ORGANISATION_NAME}" \
                --app "${PROJECT_NAME}" \
                --source local \
                --do-not-use-detected-build-config \
                --runtime-mode dynamic \
                --entrypoint="./main.ts" \
                --region us \
                --install-command "deno install" \
                --build-timeout 5 \
                --build-memory-limit 1024 \
                --no-wait || exit 0
                # Allow command to fail, as the project may exist already
                # Next step should fail if this failed for other reasons

      - name: Environment variables
        run: |
          envsubst < ".env.deploy" > ".env.deploy-output"
          deno deploy env load ".env.deploy-output" \
                --org "${DENO_DEPLOY_ORGANISATION_NAME}" \
                --app "${PROJECT_NAME}" \
                --token="${DENO_DEPLOY_TOKEN}" \
                --replace \
                --non-secrets "PUBLIC_KEY" "TEST_SERVER"
          rm  ".env.deploy-output"

      - name: Deploy
        run: |
          deno deploy \
                --prod \
                --org "${DENO_DEPLOY_ORGANISATION_NAME}" \
                --app "${PROJECT_NAME}" \
                --token="${DENO_DEPLOY_TOKEN}"

      - name: Update commands
        run: deno run --allow-all main.ts -u
